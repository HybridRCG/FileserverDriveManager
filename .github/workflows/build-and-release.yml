name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v3.8, v3.9, etc.
  workflow_dispatch:  # Allows manual trigger from GitHub UI

permissions:
  contents: write  # Required to create releases

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Extract version from Program.cs
      id: get_version
      run: |
        $versionLine = Get-Content "Program.cs" | Select-String 'APP_VERSION = "v.*"' | Select-Object -First 1
        if ($versionLine -match 'APP_VERSION = "v([0-9.]+)"') {
          $VERSION = $matches[1]
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Detected version: v$VERSION"
        } else {
          Write-Error "Could not detect version from Program.cs!"
          exit 1
        }
      shell: pwsh
    
    - name: Update installer.nsi with version
      run: |
        $VERSION = "${{ steps.get_version.outputs.VERSION }}"
        $nsiContent = Get-Content "installer.nsi" -Raw
        $nsiContent = $nsiContent -replace '!define APP_VERSION ".*"', "!define APP_VERSION `"$VERSION`""
        $nsiContent = $nsiContent -replace 'VIProductVersion ".*"', "VIProductVersion `"$VERSION.0.0`""
        Set-Content "installer.nsi" -Value $nsiContent -NoNewline
        Write-Host "installer.nsi updated to version $VERSION"
      shell: pwsh
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build project
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish self-contained executable
      run: |
        dotnet publish -c Release `
          -p:SelfContained=true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true
      shell: pwsh
    
    - name: Verify executable exists
      run: |
        if (-not (Test-Path "bin\Release\net8.0-windows\win-x64\publish\FileserverDriveManager.exe")) {
          Write-Error "Executable not found!"
          exit 1
        }
        $fileInfo = Get-Item "bin\Release\net8.0-windows\win-x64\publish\FileserverDriveManager.exe"
        Write-Host "Executable size: $([math]::Round($fileInfo.Length / 1MB, 2)) MB"
      shell: pwsh
    
    - name: Install NSIS
      run: choco install nsis -y
      shell: pwsh
    
    - name: Download and setup Resource Hacker
      run: |
        Invoke-WebRequest -Uri "http://www.angusj.com/resourcehacker/resource_hacker.zip" -OutFile "rh.zip"
        Expand-Archive -Path "rh.zip" -DestinationPath "ResourceHacker"
        Write-Host "Resource Hacker downloaded"
      shell: pwsh
    
    - name: Embed icon into executable
      run: |
        .\ResourceHacker\ResourceHacker.exe -open "bin\Release\net8.0-windows\win-x64\publish\FileserverDriveManager.exe" `
          -save "bin\Release\net8.0-windows\win-x64\publish\FileserverDriveManager.exe" `
          -action addoverwrite -res icon.ico -mask ICONGROUP,1,1033
        Start-Sleep -Seconds 3
      shell: pwsh
    
    - name: Build NSIS installer
      run: |
        & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
      shell: pwsh
    
    - name: Verify installer created
      run: |
        $VERSION = "${{ steps.get_version.outputs.VERSION }}"
        $installerName = "Drive Manager V$VERSION.exe"
        if (-not (Test-Path $installerName)) {
          Write-Error "Installer not found: $installerName"
          exit 1
        }
        $installerInfo = Get-Item $installerName
        Write-Host "Installer created: $installerName"
        Write-Host "Size: $([math]::Round($installerInfo.Length / 1MB, 2)) MB"
      shell: pwsh
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: Fileserver Drive Manager v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Fileserver Drive Manager v${{ steps.get_version.outputs.VERSION }}
          
          ### 🚀 Installation
          1. Download **Drive Manager V${{ steps.get_version.outputs.VERSION }}.exe** below
          2. Run the installer
          3. Launch from Start Menu or Desktop shortcut
          
          ### ✨ Features
          - Multi-VPN support (Tailscale & NetBird)
          - Auto-mount network drives on startup
          - Encrypted password storage
          - Self-contained executable (no .NET runtime required)
          
          ### 📝 Requirements
          - Windows 10/11 (64-bit)
          - Tailscale or NetBird VPN (optional)
        files: |
          Drive Manager V${{ steps.get_version.outputs.VERSION }}.exe
        fail_on_unmatched_files: true
        make_latest: "true"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}